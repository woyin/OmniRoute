name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
            gcc-x86-64-linux-gnu libc6-dev-amd64-cross

      - name: Build linux/amd64
        env:
          CGO_ENABLED: 1
          CC: x86_64-linux-gnu-gcc
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o omniroute_linux_amd64 ./cmd/omniroute

      - name: Build linux/arm64
        env:
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o omniroute_linux_arm64 ./cmd/omniroute

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-linux
          path: omniroute_linux_*

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build darwin/arm64
        env:
          CGO_ENABLED: 1
        run: |
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o omniroute_darwin_arm64 ./cmd/omniroute

      - name: Build darwin/amd64
        env:
          CGO_ENABLED: 1
        run: |
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o omniroute_darwin_amd64 ./cmd/omniroute

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-darwin
          path: omniroute_darwin_*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build windows/amd64
        env:
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o omniroute_windows_amd64.exe ./cmd/omniroute

      - name: Build windows/arm64
        env:
          CGO_ENABLED: 0
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" -o omniroute_windows_arm64.exe ./cmd/omniroute

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-windows
          path: omniroute_windows_*

  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -not -name "checksums.txt" | sort | xargs sha256sum > ../checksums.txt
          mv ../checksums.txt .

      - name: Create release archives
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p release

          # Linux
          tar czf release/omniroute_${VERSION}_linux_x86_64.tar.gz -C artifacts/omniroute-linux omniroute_linux_amd64
          tar czf release/omniroute_${VERSION}_linux_aarch64.tar.gz -C artifacts/omniroute-linux omniroute_linux_arm64

          # Darwin
          tar czf release/omniroute_${VERSION}_darwin_x86_64.tar.gz -C artifacts/omniroute-darwin omniroute_darwin_amd64
          tar czf release/omniroute_${VERSION}_darwin_aarch64.tar.gz -C artifacts/omniroute-darwin omniroute_darwin_arm64

          # Windows
          cd artifacts/omniroute-windows
          zip ../../release/omniroute_${VERSION}_windows_x86_64.zip omniroute_windows_amd64.exe
          zip ../../release/omniroute_${VERSION}_windows_aarch64.zip omniroute_windows_arm64.exe
          cd ../..

          # Checksums
          cp artifacts/checksums.txt release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-go') }}
