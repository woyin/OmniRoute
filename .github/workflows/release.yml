name: Release

on:
  push:
    tags: ['v*-go']

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_arch: x86_64
            ext: ''
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive_arch: aarch64
            ext: ''
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            archive_arch: x86_64
            ext: ''
          - os: macos-14
            goos: darwin
            goarch: arm64
            archive_arch: aarch64
            ext: ''
          - os: windows-latest
            goos: windows
            goarch: amd64
            archive_arch: x86_64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build and test
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go test ./...
          go build -trimpath -ldflags="-s -w" -o omniroute${{ matrix.ext }} ./cmd/omniroute
          ./omniroute${{ matrix.ext }} --help
      - name: SQLite smoke
        shell: bash
        env:
          OMNIROUTE_SMOKE_TEST: sqlite
          DATA_DIR: ${{ runner.temp }}/omniroute-smoke
        run: ./omniroute${{ matrix.ext }}
      - name: Archive
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          NAME=omniroute_${VERSION}_${{ matrix.goos }}_${{ matrix.archive_arch }}
          if [ '${{ matrix.goos }}' = windows ]; then
            7z a "${NAME}.zip" omniroute.exe README.md
          else
            tar czf "${NAME}.tar.gz" omniroute README.md
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: omniroute_*.${{ matrix.goos == 'windows' && 'zip' || 'tar.gz' }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Checksums
        working-directory: release
        run: sha256sum omniroute_* > checksums.txt && sha256sum -c checksums.txt && test "$(find . -maxdepth 1 -type f | wc -l)" -eq 6
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
