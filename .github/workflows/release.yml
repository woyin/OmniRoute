name: Release

on:
  push:
    tags:
      - "v*-go"

permissions:
  contents: read

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build and smoke-test linux/${{ matrix.arch }}
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o omniroute_linux_${GOARCH} ./cmd/omniroute
          ./omniroute_linux_${GOARCH} --smoke-sqlite

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-linux-${{ matrix.arch }}
          path: omniroute_linux_${{ matrix.arch }}

  build-darwin:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build and smoke-test darwin/${{ matrix.arch }}
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o omniroute_darwin_${GOARCH} ./cmd/omniroute
          ./omniroute_darwin_${GOARCH} --smoke-sqlite

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-darwin-${{ matrix.arch }}
          path: omniroute_darwin_${{ matrix.arch }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install MinGW-w64
        run: choco install mingw --no-progress -y

      - name: Build and smoke-test windows/amd64
        shell: pwsh
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CC: gcc
        run: |
          go build -trimpath -ldflags="-s -w" -o omniroute_windows_amd64.exe ./cmd/omniroute
          .\omniroute_windows_amd64.exe --smoke-sqlite

      - uses: actions/upload-artifact@v4
        with:
          name: omniroute-windows-amd64
          path: omniroute_windows_amd64.exe

  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir release
          tar czf "release/omniroute_${VERSION}_linux_x86_64.tar.gz" -C artifacts omniroute_linux_amd64
          tar czf "release/omniroute_${VERSION}_linux_aarch64.tar.gz" -C artifacts omniroute_linux_arm64
          tar czf "release/omniroute_${VERSION}_darwin_x86_64.tar.gz" -C artifacts omniroute_darwin_amd64
          tar czf "release/omniroute_${VERSION}_darwin_aarch64.tar.gz" -C artifacts omniroute_darwin_arm64
          (cd artifacts && zip "../release/omniroute_${VERSION}_windows_x86_64.zip" omniroute_windows_amd64.exe)

      - name: Verify release assets
        run: scripts/ci/verify-release-assets.sh release "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
