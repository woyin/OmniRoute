name: Docker Build & Push

on:
  push:
    branches: [go-rewrite]
    tags: ['v*-go']
  pull_request:
    branches: [go-rewrite]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to rebuild or repair
        required: true
        type: string
      publish_ghcr:
        description: Publish GHCR
        required: true
        default: true
        type: boolean
      publish_dockerhub:
        description: Publish Docker Hub
        required: true
        default: true
        type: boolean
      promote_latest:
        description: Also publish latest
        required: true
        default: false
        type: boolean

concurrency:
  group: docker-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_type == 'tag' && github.ref_name || 'edge' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  runtime-smoke:
    name: Runtime smoke (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build native image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: omniroute-smoke:${{ matrix.suffix }}
          cache-from: type=gha,scope=smoke-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=smoke-${{ matrix.suffix }}

      - name: Run persistence smoke
        run: scripts/ci/smoke-docker.sh omniroute-smoke:${{ matrix.suffix }}

  publication-gate:
    name: Test manifest platform checker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - run: scripts/ci/test-check-image-platforms.sh

  publish-ghcr:
    name: Publish and verify GHCR
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish_ghcr)
    needs: [runtime-smoke, publication-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve publication tags
        id: tags
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          PROMOTE_LATEST: ${{ inputs.promote_latest }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          promote_latest=false
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            tag=$DISPATCH_TAG
            [ "$PROMOTE_LATEST" = true ] && promote_latest=true
          elif [ "$GITHUB_REF_TYPE" = tag ]; then
            tag=$GITHUB_REF_NAME
            case "$tag" in
              v*-go) case "$tag" in *-alpha*|*-beta*|*-rc*) ;; *) promote_latest=true;; esac ;;
            esac
          elif [ "$GITHUB_REF_NAME" = go-rewrite ]; then
            tag=edge
          else
            tag=edge-main
          fi
          case "$tag" in ''|*/*|*:*|*[!A-Za-z0-9_.-]*) echo "invalid image tag: $tag" >&2; exit 1;; esac
          {
            echo "image=$image"
            echo "primary=$image:$tag"
            echo 'tags<<EOF'
            echo "$image:$tag"
            [ "$promote_latest" = true ] && echo "$image:latest"
            echo EOF
          } >>"$GITHUB_OUTPUT"

      - name: Build and push manifest
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=publish-ghcr
          cache-to: type=gha,mode=max,scope=publish-ghcr

      - name: Verify manifest platforms
        run: scripts/ci/check-image-platforms.sh '${{ steps.tags.outputs.primary }}'

  publish-dockerhub:
    name: Publish and verify Docker Hub
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish_dockerhub)
    needs: [runtime-smoke, publication-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check Docker Hub credentials
        id: credentials
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo 'available=true' >>"$GITHUB_OUTPUT"
          else
            echo 'available=false' >>"$GITHUB_OUTPUT"
            echo '::notice::Docker Hub publication skipped: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured'
          fi

      - if: steps.credentials.outputs.available == 'true'
        uses: actions/checkout@v4

      - if: steps.credentials.outputs.available == 'true'
        uses: docker/setup-qemu-action@v3

      - if: steps.credentials.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.credentials.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve publication tags
        if: steps.credentials.outputs.available == 'true'
        id: tags
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          PROMOTE_LATEST: ${{ inputs.promote_latest }}
        run: |
          image="${DOCKERHUB_USERNAME,,}/omniroute"
          promote_latest=false
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            tag=$DISPATCH_TAG
            [ "$PROMOTE_LATEST" = true ] && promote_latest=true
          elif [ "$GITHUB_REF_TYPE" = tag ]; then
            tag=$GITHUB_REF_NAME
            case "$tag" in
              v*-go) case "$tag" in *-alpha*|*-beta*|*-rc*) ;; *) promote_latest=true;; esac ;;
            esac
          elif [ "$GITHUB_REF_NAME" = go-rewrite ]; then
            tag=edge
          else
            tag=edge-main
          fi
          case "$tag" in ''|*/*|*:*|*[!A-Za-z0-9_.-]*) echo "invalid image tag: $tag" >&2; exit 1;; esac
          {
            echo "primary=$image:$tag"
            echo 'tags<<EOF'
            echo "$image:$tag"
            [ "$promote_latest" = true ] && echo "$image:latest"
            echo EOF
          } >>"$GITHUB_OUTPUT"

      - name: Build and push manifest
        if: steps.credentials.outputs.available == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=publish-dockerhub
          cache-to: type=gha,mode=max,scope=publish-dockerhub

      - name: Verify manifest platforms
        if: steps.credentials.outputs.available == 'true'
        run: scripts/ci/check-image-platforms.sh '${{ steps.tags.outputs.primary }}'
