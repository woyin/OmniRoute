name: Docker Build & Push

on:
  push:
    branches: [go-rewrite]
    tags: ['v*-go']
  pull_request:
    branches: [go-rewrite]
  workflow_dispatch:
    inputs:
      publish_ghcr:
        type: boolean
        default: true
      publish_dockerhub:
        type: boolean
        default: true

permissions:
  contents: read

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/omniroute

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: omniroute:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Health, writable SQLite, persistence
        run: |
          set -euo pipefail
          volume=omniroute-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          cleanup() { docker rm -f omniroute-smoke >/dev/null 2>&1 || true; docker volume rm "$volume" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker volume create "$volume"
          docker run -d --name omniroute-smoke -e JWT_SECRET=smoke-secret-at-least-32-bytes-long -p 3456:3456 -v "$volume:/app/data" omniroute:smoke
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:3456/health && break; sleep 1; done
          curl -fsS http://127.0.0.1:3456/health
          docker exec omniroute-smoke test -w /app/data
          docker exec omniroute-smoke test -s /app/data/omniroute.db
          before=$(docker exec omniroute-smoke sqlite3 /app/data/omniroute.db 'PRAGMA quick_check;')
          test "$before" = ok
          docker rm -f omniroute-smoke
          docker run -d --name omniroute-smoke -e JWT_SECRET=smoke-secret-at-least-32-bytes-long -p 3456:3456 -v "$volume:/app/data" omniroute:smoke
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:3456/health && break; sleep 1; done
          after=$(docker exec omniroute-smoke sqlite3 /app/data/omniroute.db 'PRAGMA quick_check;')
          test "$after" = ok

  publish-ghcr:
    needs: smoke
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish_ghcr)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
      - name: Verify manifest
        run: |
          docker buildx imagetools inspect "${GHCR_IMAGE}:${GITHUB_REF_NAME}" --format '{{json .Manifest}}' > manifest.json || docker buildx imagetools inspect "${GHCR_IMAGE}:latest" --format '{{json .Manifest}}' > manifest.json
          grep -q 'linux/amd64' manifest.json
          grep -q 'linux/arm64' manifest.json

  publish-dockerhub:
    needs: smoke
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish_dockerhub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
      - name: Verify manifest
        run: |
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:${GITHUB_REF_NAME}" --format '{{json .Manifest}}' > manifest.json || docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:latest" --format '{{json .Manifest}}' > manifest.json
          grep -q 'linux/amd64' manifest.json
          grep -q 'linux/arm64' manifest.json
